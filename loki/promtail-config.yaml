server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: demo-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: demo-services
          __path__: /var/log/demo/*.log

    pipeline_stages:
      - regex:
          expression: '.*"service":"(?P<service>[^"]+)".*'
      - labels:
          service:
