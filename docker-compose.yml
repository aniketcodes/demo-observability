services:
  # ── Observability ─────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    ports: ["3000:3000"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on: [prometheus, tempo, loki]
    networks: [demo-network]

  prometheus:
    image: prom/prometheus:v2.48.1
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks: [demo-network]

  tempo:
    image: grafana/tempo:2.4.1
    ports: ["3200:3200"]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/data/tempo
    networks: [demo-network]

  loki:
    image: grafana/loki:2.9.0
    ports: ["3100:3100"]
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks: [demo-network]

  promtail:
    image: grafana/promtail:2.9.0
    ports: ["9080:9080"]
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./loki/promtail-config.yaml:/etc/promtail/config.yml
      - demo-logs:/var/log/demo:ro
      - promtail-positions:/tmp
    depends_on: [loki]
    networks: [demo-network]

  grafana-mcp:
    image: grafana/mcp-grafana:latest
    command:
      - "-t"
      - "stdio"
      - "-disable-proxied"
      - "--enabled-tools"
      - "search,datasource,prometheus,loki,navigation"
    environment:
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_SERVICE_ACCOUNT_TOKEN=${GRAFANA_SERVICE_ACCOUNT_TOKEN}
    depends_on: [grafana]
    networks: [demo-network]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector/otel-collector.yml:/etc/otelcol-contrib/config.yaml
    depends_on: [tempo]
    networks: [demo-network]

volumes:
  grafana-data:
  prometheus-data:
  tempo-data:
  loki-data:
  promtail-positions:
  demo-logs:

networks:
  demo-network:
    external: true
